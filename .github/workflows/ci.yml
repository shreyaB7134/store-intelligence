name: Store Intelligence CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      # Optional: In case Postgres integrations are run, they can be configured here.
      # Currently, tests run on SQLite in-memory, so no external DB service is strictly required.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: si_user
          POSTGRES_PASSWORD: si_password
          POSTGRES_DB: store_intelligence
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.api.txt
        pip install -r requirements.dashboard.txt
        pip install -r requirements.pipeline.txt
        pip install -r requirements.test.txt

    - name: Run Tests with Coverage
      env:
        DATABASE_URL: sqlite+aiosqlite:///:memory:
      run: |
        pytest --cov=app --cov-report=term-missing --cov-fail-under=70
